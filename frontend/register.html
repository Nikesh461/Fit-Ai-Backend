<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Join the Elite | FitAI Coach</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0066FF",
                        "background-light": "#f7f8f5",
                        "background-dark": "#0a1118",
                        "card-dark": "#121c26",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        
        .glass-morphism {
            background: rgba(18, 28, 38, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 102, 255, 0.1);
        }

        .login-gradient {
            background: radial-gradient(circle at top right, rgba(0, 102, 255, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(0, 102, 255, 0.05), transparent);
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 antialiased min-h-screen flex items-center justify-center p-4 login-gradient">
    <div class="w-full max-w-[480px]">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-8">
            <div class="size-14 rounded-2xl bg-primary flex items-center justify-center shadow-2xl shadow-primary/20 mb-4 transform hover:scale-105 transition-transform">
                <span class="material-symbols-outlined text-background-dark text-3xl font-bold">bolt</span>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight">FitAI <span class="text-primary">Coach</span></h1>
            <p class="text-xs text-primary/60 font-bold uppercase tracking-[0.2em] mt-1">Elite Performance</p>
        </div>

        <!-- Register Card -->
        <div class="glass-morphism rounded-[2.5rem] p-8 md:p-10 shadow-2xl relative overflow-hidden">
            <!-- Decorative light effect -->
            <div class="absolute -top-24 -right-24 size-48 bg-primary/10 rounded-full blur-3xl"></div>
            
            <div class="relative z-10">
                <div class="mb-6">
                    <h2 class="text-2xl font-bold">Create your account</h2>
                    <p class="text-slate-400 text-sm mt-1">Start your elite performance journey today</p>
                </div>

                <form id="register-form" class="space-y-4">
                    <!-- Full Name Field -->
                    <div>
                        <label for="name" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Full Name</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">person</span>
                            <input 
                                type="text" 
                                id="name" 
                                required
                                placeholder="Alex Rivers"
                                class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600"
                            >
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Email Address</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">mail</span>
                            <input 
                                type="email" 
                                id="email" 
                                required
                                placeholder="alex@performance.com"
                                class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600"
                            >
                        </div>
                    </div>

                    <!-- Password Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Password Field -->
                        <div>
                            <label for="password" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
                                <input 
                                    type="password" 
                                    id="password" 
                                    required
                                    placeholder="••••••••"
                                    class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600"
                                >
                            </div>
                        </div>

                        <!-- Confirm Password Field -->
                        <div>
                            <label for="confirm-password" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Confirm</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">verified_user</span>
                                <input 
                                    type="password" 
                                    id="confirm-password" 
                                    required
                                    placeholder="••••••••"
                                    class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600"
                                >
                            </div>
                        </div>
                    </div>

                    <!-- Profile Details -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label for="age" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Age</label>
                            <input type="number" id="age" required placeholder="24" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 px-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600">
                        </div>
                        <div>
                            <label for="height" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Height (cm)</label>
                            <input type="number" id="height" required placeholder="175" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 px-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600">
                        </div>
                        <div>
                            <label for="weight" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Weight (kg)</label>
                            <input type="number" id="weight" required placeholder="70" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 px-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="goal" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Goal</label>
                            <select id="goal" required class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 px-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                                <option value="">Select goal</option>
                                <option value="Muscle Gain">Muscle Gain</option>
                                <option value="Fat Loss">Fat Loss</option>
                                <option value="Maintenance">Maintenance</option>
                                <option value="Strength">Strength</option>
                            </select>
                        </div>
                        <div>
                            <label for="gender" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Gender</label>
                            <select id="gender" required class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 px-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                                <option value="">Select gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label for="preference" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Workout Preference</label>
                            <select id="preference" required class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 px-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                                <option value="">Select preference</option>
                                <option value="Gym">Gym</option>
                                <option value="Home">Home</option>
                                <option value="Hybrid">Hybrid</option>
                            </select>
                        </div>
                        <div>
                            <label for="diet-preference" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Diet Preference</label>
                            <select id="diet-preference" required class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 px-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                                <option value="">Select diet</option>
                                <option value="Veg">Veg</option>
                                <option value="Non-Veg">Non-Veg</option>
                                <option value="Vegan">Vegan</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label for="cuisine-preference" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Cuisine Preference</label>
                        <select id="cuisine-preference" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 px-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
                            <option value="Mixed">Mixed</option>
                            <option value="Indian">Indian</option>
                            <option value="Western">Western</option>
                            <option value="High Protein">High Protein</option>
                        </select>
                    </div>

                    <!-- Terms -->
                    <div class="flex items-start gap-2 px-1 py-2">
                        <input type="checkbox" id="terms" required class="mt-1 size-4 rounded border-slate-800 bg-slate-900/50 text-primary focus:ring-primary focus:ring-offset-background-dark">
                        <label for="terms" class="text-[11px] text-slate-400 font-medium cursor-pointer select-none leading-relaxed">
                            I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        class="w-full bg-primary hover:bg-blue-600 text-background-dark font-black py-4 rounded-2xl shadow-lg shadow-primary/20 transition-all hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2 mt-2"
                    >
                        CREATE ACCOUNT
                        <span class="material-symbols-outlined font-bold text-xl">arrow_forward</span>
                    </button>
                    
                    <a 
                        href="login.html" 
                        class="w-full border border-slate-800 hover:bg-slate-800/50 text-slate-300 font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2 mt-3"
                    >
                        ALREADY A MEMBER? SIGN IN
                        <span class="material-symbols-outlined font-bold text-xl">login</span>
                    </a>
                </form>
            </div>
        </div>

        <!-- Footer Info -->
        <p class="text-center mt-8 text-slate-500 text-xs font-medium tracking-wide">
            FITAI COACH PERFORMANCE PLATFORM &copy; 2026
        </p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/state/auth.js"></script>
    <script src="js/utils/ui.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
