<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | FitAI Coach - Elite Performance</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0066FF",
                        "background-light": "#f7f8f5",
                        "background-dark": "#0a1118",
                        "card-dark": "#121c26",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        
        .glass-morphism {
            background: rgba(18, 28, 38, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 102, 255, 0.1);
        }

        .login-gradient {
            background: radial-gradient(circle at top right, rgba(0, 102, 255, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(0, 102, 255, 0.05), transparent);
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 antialiased min-h-screen flex items-center justify-center p-4 login-gradient">
    <div class="w-full max-w-[440px]">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-10">
            <div class="size-16 rounded-2xl bg-primary flex items-center justify-center shadow-2xl shadow-primary/20 mb-4 transform hover:scale-105 transition-transform">
                <span class="material-symbols-outlined text-background-dark text-4xl font-bold">bolt</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">FitAI <span class="text-primary">Coach</span></h1>
            <p class="text-xs text-primary/60 font-bold uppercase tracking-[0.2em] mt-1">Elite Performance</p>
        </div>

        <!-- Login Card -->
        <div class="glass-morphism rounded-[2.5rem] p-8 md:p-10 shadow-2xl relative overflow-hidden">
            <!-- Decorative light effect -->
            <div class="absolute -top-24 -right-24 size-48 bg-primary/10 rounded-full blur-3xl"></div>
            
            <div class="relative z-10">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold">Welcome back</h2>
                    <p class="text-slate-400 text-sm mt-1">Please enter your details to sign in</p>
                </div>

                <form id="login-form" class="space-y-5">
                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Email Address</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">mail</span>
                            <input 
                                type="email" 
                                id="email" 
                                required
                                placeholder="alex@performance.com"
                                class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600"
                            >
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <div class="flex justify-between items-center mb-2 ml-1">
                            <label for="password" class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Password</label>
                            <a href="#" class="text-xs text-primary hover:underline font-bold">Forgot?</a>
                        </div>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
                            <input 
                                type="password" 
                                id="password" 
                                required
                                placeholder="••••••••"
                                class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600"
                            >
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center gap-2 px-1">
                        <input type="checkbox" id="remember" class="size-4 rounded border-slate-800 bg-slate-900/50 text-primary focus:ring-primary focus:ring-offset-background-dark">
                        <label for="remember" class="text-xs text-slate-400 font-medium cursor-pointer select-none">Remember me for 30 days</label>
                    </div>

                    <button 
                        type="submit" 
                        class="w-full bg-primary hover:bg-blue-600 text-background-dark font-black py-4 rounded-2xl shadow-lg shadow-primary/20 transition-all hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2 mt-4"
                    >
                        SIGN IN
                        <span class="material-symbols-outlined font-bold text-xl">login</span>
                    </button>
                    
                    <a 
                        href="register.html" 
                        class="w-full border border-slate-800 hover:bg-slate-800/50 text-slate-300 font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2 mt-3"
                    >
                        CREATE NEW ACCOUNT
                        <span class="material-symbols-outlined font-bold text-xl">person_add</span>
                    </a>
                </form>
            </div>
        </div>

        <!-- Footer Info -->
        <p class="text-center mt-8 text-slate-500 text-xs font-medium tracking-wide">
            FITAI COACH PERFORMANCE PLATFORM &copy; 2026
        </p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/state/auth.js"></script>
    <script src="js/utils/ui.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
